<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-5">
  <h2 class="mb-4">🛒 Your Cart</h2>

  <div id="cart-items"></div>

  <h4 class="mt-4">
    Total: ₹<span id="total">0</span>
  </h4>

  <button class="btn btn-dark mt-3 w-100" onclick="clearCart()">
    Clear Cart
  </button>
</div>

<!-- WHATSAPP BUTTON -->
<div class="container py-3">
  <div class="d-grid">
    <button class="btn btn-success btn-lg" onclick="whatsappOrder()">
      📲 Order on WhatsApp
    </button>
  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* =========================
   SAVE CART
========================= */
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* =========================
   LOAD CART UI
========================= */
function loadCart() {

  let container = document.getElementById("cart-items");
  container.innerHTML = "";
  if(cart.length === 0){
    container.innerHTML = `
      <div class="text-center py-5">
        <h5>Your cart is empty 😕</h5>
        <a href="index.html" class="btn btn-dark mt-3">Shop Now</a>
      </div>
    `;
    document.getElementById("total").innerText = 0;
    return;
  }




  let grandTotal = 0;

  cart.forEach((item, index) => {

    let itemTotal = item.price * item.qty;
    grandTotal += itemTotal;

    container.innerHTML += `
      <div class="border p-3 mb-3 d-flex justify-content-between align-items-center">

        <div>
          <h5>${item.name}</h5>
          <p>Weight: ${item.weight}</p>

          <p>
            ₹${item.price} × ${item.qty} = <b>₹${itemTotal}</b>
          </p>

          <div class="d-flex align-items-center gap-2">

            <button class="btn btn-sm btn-dark" onclick="decreaseQty(${index})">-</button>

            <span class="fw-bold">${item.qty}</span>

            <button class="btn btn-sm btn-dark" onclick="increaseQty(${index})">+</button>

          </div>
        </div>

        <button class="btn btn-danger btn-sm" onclick="removeItem(${index})">
          Remove
        </button>

      </div>
    `;
  });

  document.getElementById("total").innerText = grandTotal;
}

/* =========================
   INCREASE QTY
========================= */
function increaseQty(index){
  cart[index].qty++;
  saveCart();
  loadCart();
}

/* =========================
   DECREASE QTY
========================= */
function decreaseQty(index){
  if(cart[index].qty > 1){
    cart[index].qty--;
  } else {
    cart.splice(index, 1);
  }
  saveCart();
  loadCart();
}

/* =========================
   REMOVE ITEM
========================= */
function removeItem(index){
  cart.splice(index, 1);
  saveCart();
  loadCart();
}

/* =========================
   CLEAR CART
========================= */
function clearCart(){
  cart = [];
  saveCart();
  loadCart();
}

/* =========================
   WHATSAPP ORDER
========================= */
function whatsappOrder() {
    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }

    let message = "🛒 *Order Details*\n\n";
    let total = 0;

    cart.forEach(item => {
        let itemTotal = item.price * item.qty;
        total += itemTotal;
        message += `${item.name} (${item.weight}) x ${item.qty} = ₹${itemTotal}\n`;
    });

    message += `\n💰 *Total: ₹${total}*\n`;
    message += `\n-----------------\n`;
    message += `Name:\nAddress:\nPhone:\n`;

    let phone = "919347333379"; // Nee WhatsApp number - correct ga ne undi

    // ✅ MAIN FIX - ee line marchu
    let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}

/* INIT */
loadCart();
</script>

</body>
</html>
