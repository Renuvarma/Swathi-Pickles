<!-- NAV -->
<nav class="navbar navbar-light bg-light px-3">

    <a href="cart.html" class="btn btn-outline-dark">

        <span id="cart-count" class="badge bg-dark">0</span>
    </a>

<header class="bg-dark text-white text-center p-5">

<!-- ================= MANGO ================= -->
<div class="col-md-3">
<div class="card h-100">

<img src="mango.jpeg" class="card-img-top" style="height:220px; object-fit:cover;">

<div class="card-body text-center">

<h5>Mango Pickle</h5>

<div class="mb-2">
<button class="btn btn-outline-secondary active"
onclick="selectWeight(this,400)">1/2 Kg</button>

<button class="btn btn-outline-secondary"
onclick="selectWeight(this,750)">1 Kg</button>
</div>

<h4>₹<span class="price">400</span></h4>

</div>

<div class="card-footer text-center">

<div class="cart-box">

<button class="btn btn-dark w-100 add-btn"
onclick="addToCart('Mango Pickle', this)">
Add To Cart
</button>

<div class="qty-box d-none d-flex justify-content-center align-items-center gap-2">

<button class="btn btn-dark btn-sm"
onclick="decreaseQtyCard(this)">-</button>

<span class="qty">1</span>

<button class="btn btn-dark btn-sm"
onclick="increaseQtyCard(this)">+</button>

</div>

</div>

</div>

</div>
</div>
